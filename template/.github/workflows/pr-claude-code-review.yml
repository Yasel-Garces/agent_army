name: PR — Claude Code Review

# Auto-review every PR using the code-reviewer agent from agent_army.
# Responds to @claude mentions in PR comments.

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install agent_army marketplace
        run: |
          # Inside the action's Claude Code session, the agent will load yasel-core via plugin.
          echo "Marketplace add will happen inside Claude session."

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-7
          settings_file: ".claude/settings.unattended.json"
          prompt: |
            Install the agent_army marketplace and yasel-core plugin first:

              /plugin marketplace add Yasel-Garces/agent_army
              /plugin install yasel-core@agent-army

            Then review PR #${{ github.event.pull_request.number || github.event.issue.number }}.
            Use the code-reviewer agent (.claude/agents/code-reviewer.md from the plugin) as your standard.
            Run `git diff origin/${{ github.event.pull_request.base.ref || 'main' }}...HEAD` to see changes.
            Post your review as a PR comment using `gh pr comment`.
