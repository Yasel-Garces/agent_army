name: Scheduled — Security Audit

# Weekly: full /security-audit sweep. Files Linear tickets for Critical/High findings.

on:
  schedule:
    # Sundays at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install scanners
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.0/gitleaks_8.18.0_linux_x64.tar.gz \
            | tar -xz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/
          go install github.com/google/osv-scanner/cmd/osv-scanner@latest || true

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          model: claude-opus-4-7
          settings_file: ".claude/settings.unattended.json"
          prompt: |
            Install agent_army and run a full repo-wide security audit:

              /plugin marketplace add Yasel-Garces/agent_army
              /plugin install yasel-core@agent-army
              /security-audit

            Save the report under .claude/audits/security-$(date +%Y-%m-%d).md, commit
            to a new branch named audits/security-$(date +%Y-%m-%d), and open a PR titled
            "chore(audit): weekly security audit $(date +%Y-%m-%d)".

            File a GitHub issue (use the github MCP) for each Critical finding in the
            current repository.
